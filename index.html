<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RINTIS ARAH // EXPEDITION ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="noise-overlay"></div>
    <div id="cursor"></div>

    <div id="intro-layer">
        <div class="intro-box">
            <h1 class="intro-title">RINTIS ARAH</h1>
            <button onclick="startApp()" class="btn-start">INITIATE EXPEDITION</button>
        </div>
    </div>

    <nav>
        <div class="logo" onclick="lenis.scrollTo(0)">R<span>.</span>A</div>
        
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">
        <label for="menu-toggle" class="hamburger-label">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </label>

        <div class="hud-center menu-items">
            <div class="hud-item" onclick="toggleTheme()">THEME</div>
            <div class="hud-item" onclick="lenis.scrollTo('#archive')">MISSIONS</div>
            <div class="hud-item" onclick="lenis.scrollTo('#video-archive')">CINEMATIC</div>
            <div class="hud-item mobile-only" onclick="lenis.scrollTo('#team')">CREW</div>
        </div>
        <button class="btn-primary nav-btn desktop-only" onclick="lenis.scrollTo('#team')">CREW</button>
    </nav>

    <main id="main-scroll">
        <section class="hero">
            <div class="hero-visual">
                <div class="vignette"></div>
                <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1600" class="hero-img">
            </div>
            <div class="hero-content">
                <h2 id="h-title">EXPLORE<br>THE SUMMIT</h2>
            </div>
        </section>

        <section id="archive" class="section">
            <div class="sec-header">
                <span class="hud-label">// 01 SELECT MISSION</span>
                <input type="text" id="mountain-search" placeholder="CARI GUNUNG...">
            </div>
            <div class="grid-levels" id="grid-container"></div>
        </section>

        <section id="video-archive" class="section">
            <div class="sec-header">
                <span class="hud-label">// 02 CINEMATIC ARCHIVE</span>
                <h2 class="sec-title-large">JOURNEY FILMS</h2>
            </div>
            <div class="video-grid" id="video-container"></div>
        </section>

        <section id="team" class="section">
            <div class="sec-header">
                <span class="hud-label">// 03 MEET THE CREW</span>
            </div>
            <div class="team-character-select" id="team-container"></div>
        </section>
    </main>

    <div id="detail-scene">
        <button class="close-scene" onclick="closeTrip()">CLOSE [ESC]</button>
        <div class="scene-body">
            <div class="album-wrapper">
                <div class="main-img-container">
                    <img id="d-img" src="" class="modal-img">
                    <div class="slider-controls">
                        <button onclick="prevImg()" class="slide-btn">PREV</button>
                        <button onclick="nextImg()" class="slide-btn">NEXT</button>
                    </div>
                </div>
                <div id="img-counter">1 / 1</div>
            </div>
            <div class="modal-info">
                <h1 id="d-name"></h1>
                <p id="d-desc"></p>
                <div class="modal-stats">
                    <div class="stat-box"><small>ALTITUDE</small><br><b id="d-alt"></b></div>
                    <div class="stat-box"><small>PRICE</small><br><b id="d-price"></b></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
